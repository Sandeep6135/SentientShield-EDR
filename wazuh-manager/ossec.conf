<ossec_config>
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency> <directories realtime="yes" check_all="yes">/etc,/usr/bin,/usr/sbin</directories>
    <directories realtime="yes" check_all="yes">/bin,/sbin</directories>
    
    <active-response>
      <command>firewall-drop</command>
      <location>local</location>
      <rules_id>5712,5720</rules_id> <timeout>3600</timeout>
    </active-response>
  </syscheck>
</ossec_config>